<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="620" fill="#1a0a2e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c8973a" font-size="20" font-weight="bold">Как работает «Страна Чудес»</text>

  <!-- === DEVELOPER === -->
  <rect x="30" y="70" width="220" height="90" rx="8" fill="#2a1a4e" stroke="#c8973a" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" fill="#c8973a" font-size="13" font-weight="bold">👩‍💻 Разработчик</text>
  <text x="140" y="115" text-anchor="middle" fill="#f5ead6" font-size="11">Пишет код на MacBook</text>
  <text x="140" y="133" text-anchor="middle" fill="#f5ead6" font-size="11">git commit → git push</text>

  <!-- Arrow: Developer → GitHub -->
  <line x1="250" y1="115" x2="310" y2="115" stroke="#c8973a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="108" text-anchor="middle" fill="#c8973a" font-size="10">push</text>

  <!-- === GITHUB === -->
  <rect x="310" y="70" width="200" height="90" rx="8" fill="#2a1a4e" stroke="#c8973a" stroke-width="1.5"/>
  <text x="410" y="95" text-anchor="middle" fill="#c8973a" font-size="13" font-weight="bold">🐙 GitHub</text>
  <text x="410" y="115" text-anchor="middle" fill="#f5ead6" font-size="11">Хранит код и</text>
  <text x="410" y="133" text-anchor="middle" fill="#f5ead6" font-size="11">историю изменений</text>

  <!-- Arrow: GitHub → Netlify -->
  <line x1="510" y1="115" x2="570" y2="115" stroke="#c8973a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="108" text-anchor="middle" fill="#c8973a" font-size="10">webhook</text>

  <!-- === NETLIFY === -->
  <rect x="570" y="55" width="200" height="120" rx="8" fill="#2a1a4e" stroke="#c8973a" stroke-width="1.5"/>
  <text x="670" y="80" text-anchor="middle" fill="#c8973a" font-size="13" font-weight="bold">🌐 Netlify</text>
  <!-- CDN box -->
  <rect x="585" y="88" width="80" height="50" rx="4" fill="#1a0a2e" stroke="#8b2252" stroke-width="1"/>
  <text x="625" y="107" text-anchor="middle" fill="#f5ead6" font-size="10" font-weight="bold">CDN</text>
  <text x="625" y="122" text-anchor="middle" fill="#f5ead6" font-size="9">index.html</text>
  <text x="625" y="134" text-anchor="middle" fill="#f5ead6" font-size="9">раздаёт сайт</text>
  <!-- Functions box -->
  <rect x="675" y="88" width="85" height="50" rx="4" fill="#1a0a2e" stroke="#1a5c5c" stroke-width="1"/>
  <text x="717" y="107" text-anchor="middle" fill="#f5ead6" font-size="10" font-weight="bold">Functions</text>
  <text x="717" y="122" text-anchor="middle" fill="#f5ead6" font-size="9">proxy.js</text>
  <text x="717" y="134" text-anchor="middle" fill="#f5ead6" font-size="9">хранит ключ</text>
  <!-- Auto deploy label -->
  <text x="670" y="163" text-anchor="middle" fill="#c8973a" font-size="10" font-style="italic">автодеплой при каждом коммите</text>

  <!-- Arrow: Netlify → Browser (down from CDN) -->
  <line x1="625" y1="175" x2="625" y2="230" stroke="#8b2252" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="650" y="210" fill="#8b2252" font-size="10">HTML/CSS/JS</text>

  <!-- Arrow: Functions → OpenAI -->
  <line x1="760" y1="138" x2="760" y2="260" stroke="#1a5c5c" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="770" y="210" fill="#1a5c5c" font-size="10">API запрос</text>

  <!-- === BROWSER === -->
  <rect x="430" y="260" width="260" height="150" rx="8" fill="#2a1a4e" stroke="#8b2252" stroke-width="1.5"/>
  <text x="560" y="285" text-anchor="middle" fill="#c8973a" font-size="13" font-weight="bold">🖥 Браузер пользователя</text>
  <text x="560" y="308" text-anchor="middle" fill="#f5ead6" font-size="11">1. Открывает страницу сайта</text>
  <text x="560" y="326" text-anchor="middle" fill="#f5ead6" font-size="11">2. Вводит мысль, нажимает кнопку</text>
  <text x="560" y="344" text-anchor="middle" fill="#f5ead6" font-size="11">3. Получает метафору от OpenAI</text>
  <!-- localStorage box -->
  <rect x="455" y="355" width="210" height="40" rx="4" fill="#1a0a2e" stroke="#c8973a" stroke-width="1"/>
  <text x="560" y="371" text-anchor="middle" fill="#c8973a" font-size="10" font-weight="bold">💾 localStorage</text>
  <text x="560" y="387" text-anchor="middle" fill="#f5ead6" font-size="10">история метафор в браузере</text>

  <!-- Arrow: Browser → Functions (запрос) -->
  <line x1="690" y1="310" x2="750" y2="280" stroke="#1a5c5c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-teal)"/>
  <text x="700" y="292" fill="#1a5c5c" font-size="10">запрос</text>

  <!-- Arrow: Functions → Browser (ответ) -->
  <line x1="750" y1="300" x2="695" y2="330" stroke="#1a5c5c" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="710" y="326" fill="#1a5c5c" font-size="10">метафора</text>

  <!-- === OPENAI === -->
  <rect x="570" y="280" width="160" height="100" rx="8" fill="#2a1a4e" stroke="#1a5c5c" stroke-width="1.5"/>
  <text x="650" y="305" text-anchor="middle" fill="#c8973a" font-size="13" font-weight="bold">🤖 OpenAI</text>
  <text x="650" y="325" text-anchor="middle" fill="#f5ead6" font-size="11">gpt-4o-mini</text>
  <text x="650" y="343" text-anchor="middle" fill="#f5ead6" font-size="11">генерирует метафору</text>
  <text x="650" y="361" text-anchor="middle" fill="#f5ead6" font-size="11">в стиле Алисы</text>

  <!-- Arrow: OpenAI → Functions (ответ) -->
  <line x1="730" y1="310" x2="770" y2="280" stroke="#1a5c5c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="770" y1="190" x2="730" y2="260" stroke="#1a5c5c" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- === LEGEND === -->
  <rect x="30" y="460" width="740" height="130" rx="8" fill="#2a1a4e" stroke="#c8973a" stroke-width="1" opacity="0.7"/>
  <text x="400" y="485" text-anchor="middle" fill="#c8973a" font-size="12" font-weight="bold">Три уровня</text>
  <!-- Level 1 -->
  <rect x="55" y="498" width="200" height="70" rx="6" fill="#1a0a2e" stroke="#c8973a" stroke-width="1"/>
  <text x="155" y="518" text-anchor="middle" fill="#c8973a" font-size="11" font-weight="bold">Хранение кода</text>
  <text x="155" y="536" text-anchor="middle" fill="#f5ead6" font-size="10">GitHub хранит все файлы</text>
  <text x="155" y="552" text-anchor="middle" fill="#f5ead6" font-size="10">и историю изменений</text>
  <!-- Level 2 -->
  <rect x="295" y="498" width="210" height="70" rx="6" fill="#1a0a2e" stroke="#8b2252" stroke-width="1"/>
  <text x="400" y="518" text-anchor="middle" fill="#c8973a" font-size="11" font-weight="bold">Сервер и безопасность</text>
  <text x="400" y="536" text-anchor="middle" fill="#f5ead6" font-size="10">Netlify раздаёт сайт и</text>
  <text x="400" y="552" text-anchor="middle" fill="#f5ead6" font-size="10">прячет API-ключ от пользователей</text>
  <!-- Level 3 -->
  <rect x="545" y="498" width="200" height="70" rx="6" fill="#1a0a2e" stroke="#1a5c5c" stroke-width="1"/>
  <text x="645" y="518" text-anchor="middle" fill="#c8973a" font-size="11" font-weight="bold">Интеллект</text>
  <text x="645" y="536" text-anchor="middle" fill="#f5ead6" font-size="10">OpenAI думает и</text>
  <text x="645" y="552" text-anchor="middle" fill="#f5ead6" font-size="10">генерирует поэтичный текст</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c8973a"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b2252"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a5c5c"/>
    </marker>
  </defs>
</svg>
